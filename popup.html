<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Breakdown</title>
  <link rel="stylesheet" href="ui.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h2>Portfolio</h2>
    <span class="header-chip">Live Snapshot</span>
  </header>

  <main class="content">
    <section class="card">
      <h3 class="section-title">Allocation</h3>
      <div id="portfolio"></div>
    </section>

    <section class="card">
      <h3 class="section-title">Summary</h3>
      <div id="portfolio-value"></div>
      <div id="return-percentage-container" class="kv kv-static">
        <span class="kv-label">Return %</span>
        <span id="return-percentage" class="kv-value">—</span>
      </div>
      <div id="purchase-power"></div>
      <div id="cach-in-holding"></div>
      <div id="total-money"></div>
    </section>

    <section class="card">
      <h3 class="section-title">Top Positions</h3>
      <div id="top-positions"></div>
      <div id="concentration-risk"></div>
    </section>

    <section class="card">
      <h3 class="section-title">Account Readiness</h3>
      <div id="account-readiness-status"></div>
      <div id="account-readiness-reason"></div>
    </section>

    <section class="card">
      <h3 class="section-title">Technical Signal</h3>
      <div id="technical-signal"></div>
    </section>

    <section class="card">
      <h3 class="section-title">Settings</h3>
      <div class="input-group">
        <label for="investmentTotalInput">Total Investment</label>
        <div class="input-row">
          <input type="number" id="investmentTotalInput" placeholder="Enter total investment">
          <button id="saveInvestmentTotalButton" type="button">Save</button>
        </div>
      </div>
    </section>
  </main>

  <script src="ui.js"></script>
  <script src="popup.js"></script>
</body>
</html>
